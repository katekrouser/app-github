name: Playwright Tests
on:
  push:
    branches: 
      - main
      - master
      - 'feature/**'
  pull_request:
    branches: [ main, master ]
  workflow_dispatch:
    inputs:
      test_tag:
        description: 'Select Test Tag to Run'
        required: true
        default: '@regression'
        type: choice
        options:
          - '@regression'
          - '@smoke'
          - '@sanity'
      
      project_env:
        description: 'Select Project/Environment'
        required: true
        default: 'dev'
        type: choice
        options:
          - 'dev'
          - 'staging'

      enable_trace:
        description: 'Enable Playwright Trace (for debugging)'
        required: true
        default: false
        type: boolean 

jobs:
  test:
    timeout-minutes: 60
    runs-on: ubuntu-latest
    steps:
    - uses: actions/checkout@v4
    - uses: actions/setup-node@v4
      with:
        node-version: lts/*
    - name: Install dependencies
      run: npm ci --force
    - name: Install Playwright Browsers
      run: npx playwright install --with-deps --force
    - name: Run Playwright tests
      run: npm run test:regression
    - uses: actions/upload-artifact@v4
      if: ${{ !cancelled() }}
      with:
        name: playwright-report
        path: playwright-report/
        retention-days: 30
